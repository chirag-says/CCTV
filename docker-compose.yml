# ============================================================================
# AI CCTV Surveillance System — Docker Compose
# ============================================================================

version: "3.9"

services:
  # ── Backend API Server ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cctv-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/snapshots:/app/snapshots
      - /dev/video0:/dev/video0 # Webcam passthrough (Linux)
    devices:
      - /dev/video0:/dev/video0 # Camera access
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cctv-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
